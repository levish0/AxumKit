# pgBackRest config — SHARED by prod + dev (env-agnostic, like the other compose/production
# configs). Per-env + secret values (R2 bucket/keys/endpoint, repo path) come from
# .envs/.<env>/pgbackrest.env as PGBACKREST_* env vars; pgBackRest reads any option from
# its matching PGBACKREST_<OPTION> variable. Mounted read-only at
# /etc/pgbackrest/pgbackrest.conf inside the postgres container.
#
# Stanza name is "db" (used in every `pgbackrest --stanza=db ...` command and in the
# postgres archive_command). Repo lives on R2 (S3-compatible); see pgbackrest.env.

[global]
repo1-type=s3
# R2 needs path-style addressing (bucket in the path, not the host).
repo1-s3-uri-style=path
# Retention: keep the N newest full backups (and the WAL needed to recover them);
# older fulls + their diffs/WAL are expired automatically after each backup.
# Bump this to keep more history (costs more R2 storage).
repo1-retention-full=2
repo1-retention-full-type=count
# zstd: fast with a high compression ratio.
compress-type=zst
compress-level=3
process-max=4
log-level-console=info
log-level-file=detail
log-path=/var/log/pgbackrest
# Copy-start the backup without waiting for a checkpoint to complete, and only copy
# changed files relative to the last backup (delta) — both cut backup time/IO.
start-fast=y
delta=y

[global:archive-push]
process-max=2

[db]
pg1-path=/var/lib/postgresql/18/docker
pg1-port=5432
pg1-socket-path=/var/run/postgresql
# Bootstrap superuser from postgres.env (POSTGRES_USER). Local socket auth is "trust"
# in the official image, so no password is needed for the in-container connection.
pg1-user=axumkit
pg1-database=postgres
