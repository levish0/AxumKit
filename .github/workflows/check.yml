name: check

on:
  push:
  pull_request:

concurrency:
  group: check-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      # Unit/integration tests run in the parallel test workflow; the full-stack
      # e2e suite runs in the dedicated e2e workflow.
      - name: OpenAPI schema drift
        run: |
          cargo xtask openapi
          git diff --exit-code swagger.json

  migrations:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: axumkit
          POSTGRES_PASSWORD: axumkit
          POSTGRES_DB: axumkit
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U axumkit"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://axumkit:axumkit@localhost:5432/axumkit

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      - name: Apply migrations to a fresh database
        run: cargo run -p migration

      - name: Migration status
        run: cargo run -p migration status
