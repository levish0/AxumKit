name: e2e

on:
  push:
  pull_request:

concurrency:
  group: e2e-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      - name: Start the test stack
        run: docker compose -f docker-compose.test.yml up -d --build --wait

      - name: Run e2e tests
        run: cargo test -p e2e

      - name: Dump container logs on failure
        if: failure()
        run: docker compose -f docker-compose.test.yml logs --tail 200

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.test.yml down -v
